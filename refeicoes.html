  <script>
  (function () {
    const savedTheme = localStorage.getItem('nl-theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
    
    // Executa assim que o HTML estiver pronto na tela
    document.addEventListener("DOMContentLoaded", function() {
      const iconEl = document.querySelector('#btn-dark-mode i');
      
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        if (iconEl) iconEl.className = 'bi bi-sun-fill'; // Garante o Sol no Dark Mode
      } else {
        document.body.classList.remove('dark-mode');
        if (iconEl) iconEl.className = 'bi bi-moon-fill'; // Garante a Lua no Light Mode
      }
    });
  })();
</script>

  <script>
    // Inicialização e Renderização Base dos Dias da Semana
    const diasSemana = [
      "Segunda-feira", "Terça-feira", "Quarta-feira", 
      "Quinta-feira", "Sexta-feira", "Sábado", "Domingo"
    ];

    const categorias = [
      { id: "cafe", nome: "Café da Manhã", icone: "bi-cup-hot", cor: "text-success" },
      { id: "lanche", nome: "Lanche", icone: "bi-apple", cor: "text-warning" },
      { id: "almoco", nome: "Almoço", icone: "bi-sun", cor: "text-success" },
      { id: "janta", nome: "Jantar", icone: "bi-moon-stars", cor: "text-info" }
    ];

    function renderizarEstruturaSemana() {
      const container = document.getElementById('semana-refeicoes-container');
      container.innerHTML = '';

      diasSemana.forEach(dia => {
        let categoriasHTML = '';
        
        categorias.forEach(cat => {
          categoriasHTML += `
            <div class="nl-periodo-bloco mb-3" data-categoria="${cat.id}">
              <h6 class="nl-label mb-1 fw-bold ${cat.cor}">
                <i class="bi ${cat.icone} me-1"></i>${cat.nome}
              </h6>
              <div class="text-muted fs-7 ps-3 placeholder-alimento">
                Nenhum alimento adicionado
              </div>
            </div>
          `;
        });

        const cardDia = `
          <div class="col-12 col-md-6 col-xl-4">
            <div class="nl-card p-3 rounded-3 h-100">
              <h3 class="nl-h3 border-bottom pb-2 mb-3 d-flex justify-content-between align-items-center">
                <span>${dia}</span>
                <span class="badge bg-success-subtle text-success fs-7 d-none">0 kcal</span>
              </h3>
              ${categoriasHTML}
            </div>
          </div>
        `;
        container.innerHTML += cardDia;
      });
    }

    // Gerenciador do Dark Mode acoplado ao seu sistema de classes locais
    function toggleDarkMode() {
      const body = document.body;
      const icon = document.querySelector('#btn-dark-mode i');
      
      body.classList.toggle('dark-mode');
      
      if (body.classList.contains('dark-mode')) {
        icon.className = 'bi bi-sun-fill';
        localStorage.setItem('nl-theme', 'dark');
      } else {
        icon.className = 'bi bi-moon-fill';
        localStorage.setItem('nl-theme', 'light');
      }
    }

    // Carrega o tema salvo ao abrir a página
    document.addEventListener('DOMContentLoaded', () => {
      renderizarEstruturaSemana();
      
      if (localStorage.getItem('nl-theme') === 'dark') {
        document.body.classList.add('dark-mode');
        document.querySelector('#btn-dark-mode i').className = 'bi bi-sun-fill';
      }
    });
  </script>
